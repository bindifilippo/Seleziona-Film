<!--Dichiarazione tipo di documento-->
<!DOCTYPE html>
<!--Contenitore html e lingua italiana-->
<html lang="it">
  <!--Informazioni tecniche non visibili-->
  <head>
    <!--standard per scrivere accenti e caratteri speciali-->
      <meta charset="utf-8" />
    <!--Rende la pagina responsive su mobile, usando la larghezza reale del dispositivo e uno zoom iniziale 1:1. -->
      <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--Titolo della pagina che vedo nella tab del browser-->
      <title>Seleziona film</title>
    <!--Collegamento pagina stile-->
      <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <div class="layout"> 
      <div class="column"> 
        <section class="nav-menu">
          <h2>Generi</h2>
          <div id="generi" class="generi"></div>
        </section> 

        <div id="attiva-form"> 
          <h2 class="titolo-form">Inserisci nuovo film</h2>
        </div>
          <div id="glasspane">
            <section id="form">
              <h2 class="titolo-form">Inserisci nuovo film</h2>
              <form id="aggiungi-film" action="#" method="post" >
                <input type="text" 
                      name="nome" 
                      placeholder="Titolo"/>
                <input type="text" 
                      name="genere"
                      placeholder="Regista" />
                <input type="text" 
                      name="genere"
                      placeholder="Anno" />
                 <!-- <label for="genere">Genere</label>-->
                  <select id="genere" name="genere">
                    <option value="drammatico">Drammatico</option>
                    <option value="azione">Azione</option>
                    <option value="commedia">Commedia</option>
                  </select>
                  <div class="buttons">
                    <input type="submit" value="Inserisci" />
                    <input type="reset" value="Cancella"/>
                  </div>
              </form>
            </section>
          </div>
      </div>
      <section>
        <h2>Film per genere</h2>
        <div id="contenitore-blocchi"></div>
      </section>
      <div class="column"> 
        <div class="area-bottoni"> 
          <div id="aggiungi" class="bottone">
            <h4>Aggiungi</h4>
          </div>
          <div id="rimuovi" class="bottone">
            <h4>Rimuovi</h4>
          </div>
        </div>
        <section>
          <h2>La mia lista</h2>
          <div id="playlist" class="griglia-playlist"></div>
        </section>
      </div>
    </div>
    <script type="module" src="dist/film.js"></script>
    <script type="module" src="dist/interazione.js"></script>
  </body>
</html>
